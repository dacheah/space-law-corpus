name: Watch sources
# Monthly (and on-demand) check of the monitored sources. If a source changed,
# it opens a review issue and advances the stored baseline. Automation only
# watches and queues; the maintainer judges. Nothing is ingested automatically.
on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of each month
  workflow_dispatch:
permissions:
  contents: write   # to update monitoring/ baseline
  issues: write     # to open a review issue
jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - id: watch
        run: python3 scripts/watch_sources.py
      - name: Commit updated baseline
        run: |
          git config user.name "corpus-monitor[bot]"
          git config user.email "actions@github.com"
          git add monitoring/
          git commit -m "monitoring: update source baseline [skip ci]" || echo "no baseline changes"
          git push || echo "nothing to push"
      - name: Open review issue on change or breakage
        # `changes` now also goes true when a source could not be checked. Until monitor v3.5 the
        # flag omitted both error terms, so a run in which every source errored went green and
        # opened nothing. Staging is already `git add monitoring/`, so snapshots are covered here.
        if: steps.watch.outputs.changes == 'true'
        uses: actions/github-script@v9
        env:
          BROKEN: ${{ steps.watch.outputs.broken }}
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('monitoring/last_report.md', 'utf8');
            const broken = process.env.BROKEN === 'true';
            const today = new Date().toISOString().slice(0, 10);
            const foot = broken
              ? '\n\n_An error means the monitor DID NOT LOOK. It does not mean nothing changed._'
              : '\n\n_Automation only watches and queues. Nothing is ingested automatically._';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: broken
                ? `MONITOR BROKEN — source(s) not checked — ${today}`
                : `Source change detected — ${today}`,
              body: report + foot,
              labels: broken ? ['monitoring', 'monitor-broken'] : ['monitoring', 'needs-review']
            });
