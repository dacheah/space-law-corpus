name: Validate corpus
# Runs the integrity/structure validator on every change. Catches any silent
# alteration (hash mismatch), schema break, broken derived-trace, or the two-layer
# wall being crossed, before it is merged.
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - run: python3 scripts/validate_corpus.py
