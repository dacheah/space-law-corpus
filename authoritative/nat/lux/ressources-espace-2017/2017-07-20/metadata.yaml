  is unofficial and belongs in the derived layer. SOURCE: Legilux (the official Journal officiel), retrieved
  2026-07-03 via Claude in Chrome because the automated fetcher could not reach Legilux. FIDELITY NOTE:
  the official Legilux HTML rendering carries spacing defects in a few spots — Art. 7(2) (''L’exploitantàagréerdoitdisposer…''),
  Art. 12 (''conditions es articles''), Art. 16 (''pleineent responsable''). These are reproduced faithfully
  as they appear in the official HTML rather than silently corrected; the Journal officiel PDF should
  be checked to confirm/correct them (text_fidelity: extracted_unverified, tracked follow-on). VERIFIED
  2026-07-03: the official Legilux Journal officiel PDF was obtained and stored as original.pdf (integrity-anchor
  upgrade); text.txt matches it token-for-token and the three spacing defects are confirmed present in
  the official source.'
