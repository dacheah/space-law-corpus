provenance_note: 'English authentic text of the Rescue Agreement, RE-SOURCED 2026-07-02 from UNOOSA''s
  official consolidated publication ST/SPACE/61/Rev.3 (International Space Law: United Nations Instruments,
  2025), replacing the earlier base text taken from the Australian Treaty Series (AustLII). The Australian
  reproduction was an interim source (UNOOSA''s own Rescue page was unfetchable at ingestion) and, on
  verification, deviated from the authentic UN text in orthography and in the ordering of the depositary
  Governments and authentic languages. Article 10 confirms the Chinese, English, French, Russian and Spanish
  texts are equally authentic. original.txt is the raw ST/SPACE/61 Rescue-region extract; text.txt is
  the cleaned authentic text (page furniture, footnote superscripts and soft hyphenation removed, paragraphs
  reflowed). The prior Australian-sourced text and its interim corrections are preserved in Git history.'
