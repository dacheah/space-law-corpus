provenance_note: 'English authentic text of the Rescue Agreement. SOURCE OF RECORD ISSUE: the UNOOSA Rescue
  text page was unfetchable on five attempts (2026-07-02) and the only other readily-fetchable full copy
  (JAXA space-law library) contained transcription errors (e.g. ''Nothing'' for ''Noting''), so it was
  rejected. This text is instead taken from the Australian Treaty Series 1986 No. 8 via AustLII -- an
  official government treaty-series reproduction of the authentic English text (Article 10 confirms the
  English, Russian, French, Spanish and Chinese texts are equally authentic). original.txt is the ATS
  document capture; text.txt is the extracted treaty text (preamble through the final clause done 22 April
  1968), with ATS footnotes, the ''signatures not reproduced'' note, and markdown removed, and hard-wrapped
  lines rejoined. FIDELITY: extracted_unverified; the ATS reproduction may carry minor orthographic variants
  (e.g. ''authorised''); re-capture and verification against the UN Treaty Series certified English text
  (672 UNTS 119) is a tracked follow-on.'
